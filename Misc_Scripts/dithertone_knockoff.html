<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-g">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dithering Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent body scroll */
        }
        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #controls-panel {
            background-color: #1f232a;
            border-left: 1px solid #363c47;
        }
        #image-preview-area {
            background-color: #111317;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px;
            background: #e5e7eb; border-radius: 50%;
            cursor: pointer; transition: background-color 0.2s ease-in-out;
        }
        input[type="range"]:active::-webkit-slider-thumb { background-color: #a78bfa; }
        input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px;
            background: #e5e7eb; border-radius: 50%; cursor: pointer;
        }
        input[type="color"] {
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            width: 100%; height: 32px;
            background-color: transparent; border: none; cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch {
            border-radius: 0.375rem; /* rounded-md */
            border: 1px solid #4a5568;
        }
        input[type="color"]::-moz-color-swatch {
            border-radius: 0.375rem; /* rounded-md */
            border: 1px solid #4a5568;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .control-group-header {
            border-bottom: 1px solid #363c47;
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: #d1d5db; /* gray-300 */
        }
        .control-value {
            font-family: monospace;
            font-size: 0.875rem;
            color: #9ca3af; /* gray-400 */
            width: 3rem;
            text-align: right;
        }
        .custom-select {
            background-color: #374151; /* gray-700 */
            border: 1px solid #4b5563; /* gray-600 */
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 flex h-screen">

    <main id="image-preview-area" class="flex-1 h-screen overflow-auto p-8 flex flex-col items-center justify-center relative">
        <div id="upload-prompt" class="text-center text-gray-500 absolute z-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <h3 class="mt-4 text-lg font-medium">Upload an Image</h3>
            <p class="text-sm">Drag and drop or use the panel on the right.</p>
        </div>
        
        <div id="canvas-wrapper" class="relative z-10 flex flex-col space-y-8">
            <div>
                <h2 class="text-lg font-semibold mb-3 text-gray-300 text-center opacity-0" id="original-title">Original</h2>
                <canvas id="canvas-original" class="max-w-full max-h-full rounded-lg shadow-lg"></canvas>
            </div>
            <div>
                <h2 class="text-lg font-semibold mb-3 text-gray-300 text-center opacity-0" id="dithered-title">Dithered Output</h2>
                <canvas id="canvas-dithered" class="max-w-full max-h-full rounded-lg shadow-lg"></canvas>
            </div>
        </div>
    </main>

    <aside id="controls-panel" class="w-[380px] h-screen flex-shrink-0 flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-2xl font-bold text-white">Dithering Studio</h1>
            <p class="text-sm text-gray-400">1-Bit & Tonal Mapping Toolkit</p>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            
            <div>
                <label for="imageLoader" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition-colors duration-200 flex items-center justify-center space-x-2 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>Upload Image</span>
                </label>
                <input type="file" id="imageLoader" accept="image/*" class="hidden"/>
                <p id="image-info" class="text-xs text-gray-500 mt-2 h-8"></p>
            </div>

            <div class="space-y-4">
                <div class="control-group-header">
                    <h3 class="text-lg font-semibold text-white">Render Settings</h3>
                </div>
                
                <div class="space-y-2">
                    <label for="scale-slider" class="control-label">
                        <span>Scale</span>
                        <span id="scale-value" class="control-value">100%</span>
                    </label>
                    <input id="scale-slider" type="range" min="10" max="100" value="100" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                </div>
                
                <div class="space-y-2">
                    <label for="resampling-select" class="control-label"><span>Resampling</span></label>
                    <select id="resampling-select" class="w-full rounded-lg p-2 text-white custom-select">
                        <option value="smooth">Smooth (High Quality)</option>
                        <option value="sharp">Sharp (Pixelated)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label for="dither-select" class="control-label"><span>Algorithm</span></label>
                    <select id="dither-select" class="w-full rounded-lg p-2 text-white custom-select">
                        <option value="floyd-steinberg">Floyd-Steinberg</option>
                        <option value="atkinson">Atkinson</option>
                        <option value="sierra-lite">Sierra Lite</option>
                        <option value="bayer4x4">Bayer (4x4)</option>
                        <option value="bayer8x8">Bayer (8x8)</option>
                        <option value="halftone4x4">Halftone (4x4)</option>
                        <option value="noise">Noise</option>
                        <option value="threshold">Threshold</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <div class="control-group-header">
                    <h3 class="text-lg font-semibold text-white">Effect Controls</h3>
                </div>
                <div class="space-y-2">
                    <label for="sharpen-slider" class="control-label">
                        <span>Sharpen</span>
                        <span id="sharpen-value" class="control-value">0</span>
                    </label>
                    <input id="sharpen-slider" type="range" min="0" max="100" value="0" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                </div>
                 <div class="space-y-2">
                    <label for="blur-slider" class="control-label">
                        <span>Blur (px)</span>
                        <span id="blur-value" class="control-value">0</span>
                    </label>
                    <input id="blur-slider" type="range" min="0" max="10" value="0" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="space-y-2">
                    <label for="brightness-slider" class="control-label">
                        <span>Brightness</span>
                        <span id="brightness-value" class="control-value">0</span>
                    </label>
                    <input id="brightness-slider" type="range" min="-100" max="100" value="0" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="space-y-2">
                    <label for="contrast-slider" class="control-label">
                        <span>Contrast</span>
                        <span id="contrast-value" class="control-value">0</span>
                    </label>
                    <input id="contrast-slider" type="range" min="-100" max="100" value="0" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <div class="space-y-4">
                <div class="control-group-header">
                    <h3 class="text-lg font-semibold text-white">Tonal Controls</h3>
                </div>
                <div class="space-y-2">
                    <label for="tonal-map-select" class="control-label"><span>Tonal Mapping</span></label>
                    <select id="tonal-map-select" class="w-full rounded-lg p-2 text-white custom-select">
                        <option value="2">2 Color (1-Bit)</option>
                        <option value="3">3 Color</option>
                        <option values="4">4 Color</option>
                    </select>
                </div>
                
                <div id="color-pickers-wrapper" class="grid grid-cols-2 gap-4 pt-2">
                    <div id="color-group-shadows" class="space-y-1">
                        <label class="text-sm font-medium text-gray-300">Shadows</label>
                        <input type="color" id="color-shadows" value="#000000">
                    </div>
                    <div id="color-group-mid-dark" class="space-y-1 hidden">
                        <label class="text-sm font-medium text-gray-300">Mid-Dark</label>
                        <input type="color" id="color-mid-dark" value="#555555">
                    </div>
                    <div id="color-group-mid-light" class="space-y-1 hidden">
                        <label class="text-sm font-medium text-gray-300">Mid-Light</label>
                        <input type="color" id="color-mid-light" value="#aaaaaa">
                    </div>
                    <div id="color-group-highlights" class="space-y-1">
                        <label class="text-sm font-medium text-gray-300">Highlights</label>
                        <input type="color" id="color-highlights" value="#ffffff">
                    </div>
                </div>
            </div>

            <div class="space-y-4 pt-4">
                <button id="downloadBtn" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition-colors duration-200 disabled:bg-gray-600 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Download Current</span>
                </button>
                <div class="border-t border-gray-700 pt-4">
                    <input type="file" id="batchLoader" webkitdirectory directory multiple class="hidden"/>
                    <button id="batchTrigger" class="w-full bg-gray-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-gray-700 transition-colors duration-200 flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        <span>Select Folder for Batch</span>
                    </button>
                    <button id="batchBtn" class="w-full mt-2 bg-purple-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-purple-700 transition-colors duration-200 disabled:bg-gray-600 disabled:cursor-not-allowed flex items-center justify-center space-x-2 hidden">
                        <span id="batchBtn-text">Process Files</span>
                        <div id="batch-loader" class="loader hidden"></div>
                    </button>
                    <p id="batch-info" class="text-xs text-gray-500 mt-2 h-4"></p>
                </div>
            </div>
        </div>
    </aside>

    <script>
        // --- DOM Elements ---
        const imageLoader = document.getElementById('imageLoader');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleValue = document.getElementById('scale-value');
        const resamplingSelect = document.getElementById('resampling-select');
        const ditherSelect = document.getElementById('dither-select');
        
        const sharpenSlider = document.getElementById('sharpen-slider');
        const sharpenValue = document.getElementById('sharpen-value');
        const blurSlider = document.getElementById('blur-slider');
        const blurValue = document.getElementById('blur-value');
        const brightnessSlider = document.getElementById('brightness-slider');
        const brightnessValue = document.getElementById('brightness-value');
        const contrastSlider = document.getElementById('contrast-slider');
        const contrastValue = document.getElementById('contrast-value');
        
        const tonalMapSelect = document.getElementById('tonal-map-select');
        const colorPickersWrapper = document.getElementById('color-pickers-wrapper');
        const colorGroups = {
            shadows: document.getElementById('color-group-shadows'),
            midDark: document.getElementById('color-group-mid-dark'),
            midLight: document.getElementById('color-group-mid-light'),
            highlights: document.getElementById('color-group-highlights')
        };
        const colorInputs = {
            shadows: document.getElementById('color-shadows'),
            midDark: document.getElementById('color-mid-dark'),
            midLight: document.getElementById('color-mid-light'),
            highlights: document.getElementById('color-highlights')
        };
        
        const downloadBtn = document.getElementById('downloadBtn');
        const batchLoader = document.getElementById('batchLoader');
        const batchTrigger = document.getElementById('batchTrigger');
        const batchBtn = document.getElementById('batchBtn');
        const batchBtnText = document.getElementById('batchBtn-text');
        const batchLoaderSpinner = document.getElementById('batch-loader');
        const batchInfo = document.getElementById('batch-info');

        const canvasOriginal = document.getElementById('canvas-original');
        const ctxOriginal = canvasOriginal.getContext('2d', { willReadFrequently: true });
        const canvasDithered = document.getElementById('canvas-dithered');
        const ctxDithered = canvasDithered.getContext('2d', { willReadFrequently: true });

        const uploadPrompt = document.getElementById('upload-prompt');
        const originalTitle = document.getElementById('original-title');
        const ditheredTitle = document.getElementById('dithered-title');
        const imageInfo = document.getElementById('image-info');
        
        let originalImage = new Image();

        // --- Dither Matrices ---
        const bayer4x4 = [
            [0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]
        ];
        const bayer8x8 = [
            [ 0, 32,  8, 40,  2, 34, 10, 42], [48, 16, 56, 24, 50, 18, 58, 26], [12, 44,  4, 36, 14, 46,  6, 38], [60, 28, 52, 20, 62, 30, 54, 22],
            [ 3, 35, 11, 43,  1, 33,  9, 41], [51, 19, 59, 27, 49, 17, 57, 25], [15, 47,  7, 39, 13, 45,  5, 37], [63, 31, 55, 23, 61, 29, 53, 21]
        ];
        const halftone4x4 = [
            [12, 5, 6, 13], [4, 0, 1, 7], [11, 3, 2, 8], [15, 10, 9, 14]
        ];

        // --- Event Listeners ---
        imageLoader.addEventListener('change', handleImageUpload);
        
        // Drag and Drop
        const previewArea = document.getElementById('image-preview-area');
        previewArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            previewArea.style.backgroundColor = '#1a1d22';
        });
        previewArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            previewArea.style.backgroundColor = '#111317';
        });
        previewArea.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            previewArea.style.backgroundColor = '#111317';
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleImageUpload({ target: { files: files } });
            }
        });


        [ditherSelect, resamplingSelect, tonalMapSelect, ...Object.values(colorInputs)].forEach(el => 
            el.addEventListener('change', processImage)
        );
        
        const sliders = [
            { el: scaleSlider, val: scaleValue, suffix: '%' },
            { el: sharpenSlider, val: sharpenValue },
            { el: blurSlider, val: blurValue },
            { el: brightnessSlider, val: brightnessValue },
            { el: contrastSlider, val: contrastValue },
        ];

        sliders.forEach(({el, val, suffix = ''}) => {
            el.addEventListener('input', () => { val.textContent = el.value + suffix; });
            el.addEventListener('change', processImage);
        });
        
        tonalMapSelect.addEventListener('change', updateColorPickers);

        downloadBtn.addEventListener('click', downloadImage);
        batchTrigger.addEventListener('click', () => batchLoader.click());
        batchLoader.addEventListener('change', handleBatchSelect);
        batchBtn.addEventListener('click', handleBatchProcess);

        // --- Initial State ---
        downloadBtn.disabled = true;

        // --- Core Functions ---
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    uploadPrompt.style.display = 'none';
                    originalTitle.style.opacity = 1;
                    ditheredTitle.style.opacity = 1;
                    imageInfo.textContent = `Original: ${originalImage.width}x${originalImage.height}px`;
                    processImage();
                    downloadBtn.disabled = false;
                }
                originalImage.onerror = () => {
                    alert('Error loading image. Please try a different file.');
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function updateColorPickers() {
            const numColors = parseInt(tonalMapSelect.value);
            
            colorGroups.midDark.classList.toggle('hidden', numColors < 3);
            colorGroups.midLight.classList.toggle('hidden', numColors < 4);

            colorPickersWrapper.className = numColors === 2 ? 'grid grid-cols-2 gap-4 pt-2' : 'grid grid-cols-2 gap-4 pt-2';
        }

        function drawScaledImageToCanvas(img, canvas, ctx) {
             if (!img.src) return;
            const scale = parseInt(scaleSlider.value) / 100;
            
            // Calculate final target dimensions
            let targetWidth = Math.round(img.width * scale);
            let targetHeight = Math.round(img.height * scale);

            // Create an offscreen canvas for multi-step downsampling
            const oc = document.createElement('canvas');
            const octx = oc.getContext('2d');

            oc.width = img.width;
            oc.height = img.height;
            octx.imageSmoothingEnabled = false;
            octx.drawImage(img, 0, 0);

            const resampling = resamplingSelect.value;

            if (resampling === 'smooth' && scale < 1) {
                let currentWidth = img.width;
                let currentHeight = img.height;
                // Progressively scale down by 50%
                while (currentWidth * 0.5 > targetWidth) {
                    currentWidth *= 0.5;
                    currentHeight *= 0.5;
                    octx.drawImage(oc, 0, 0, currentWidth * 2, currentHeight * 2, 0, 0, currentWidth, currentHeight);
                }
                // Final draw to the visible canvas with the smoothed result
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(oc, 0, 0, currentWidth, currentHeight, 0, 0, targetWidth, targetHeight);
            } else {
                // Use sharp, pixelated scaling
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
            }

            // Update the resolution info text
            if (scale < 1) {
                 imageInfo.textContent = `Original: ${img.width}x${img.height}px  →  Scaled: ${canvas.width}x${canvas.height}px`;
            } else {
                 imageInfo.textContent = `Original: ${img.width}x${img.height}px`;
            }
        }

        function processImage() {
            if (!originalImage.src) return;
            
            // 1. Draw scaled original to canvas
            drawScaledImageToCanvas(originalImage, canvasOriginal, ctxOriginal);
            
            // 2. Apply filters (Blur, Sharpen, Brightness, Contrast)
            // We apply these to the original canvas context
            const blur = parseInt(blurSlider.value);
            const sharpen = parseInt(sharpenSlider.value) / 100;
            const brightness = parseInt(brightnessSlider.value);
            const contrast = parseInt(contrastSlider.value);

            let filterString = '';
            if (blur > 0) filterString += `blur(${blur}px) `;
            if (brightness !== 0) filterString += `brightness(${100 + brightness}%) `;
            if (contrast !== 0) filterString += `contrast(${100 + contrast}%) `;
            
            ctxOriginal.filter = filterString;
            ctxOriginal.drawImage(canvasOriginal, 0, 0); // Re-draw with filters
            ctxOriginal.filter = 'none'; // Reset filter

            let imageData = ctxOriginal.getImageData(0, 0, canvasOriginal.width, canvasOriginal.height);
            
            // Apply Sharpen manually (if needed)
            if (sharpen > 0) {
                applySharpen(imageData.data, canvasOriginal.width, canvasOriginal.height, sharpen);
            }
            
            // 3. Convert to grayscale
            const grayscaleData = toGrayscale(imageData.data);

            // 4. Apply the selected dithering algorithm
            const algorithm = ditherSelect.value;
            const numColors = parseInt(tonalMapSelect.value);
            
            // Create a copy of grayscale data for dithering
            let ditheredGrayscale = new Float32Array(grayscaleData);

            switch(algorithm) {
                case 'floyd-steinberg':
                case 'atkinson':
                case 'sierra-lite':
                    applyErrorDiffusion(ditheredGrayscale, canvasOriginal.width, algorithm, numColors);
                    break;
                case 'bayer4x4':
                case 'bayer8x8':
                case 'halftone4x4':
                    applyOrderedDither(ditheredGrayscale, canvasOriginal.width, canvasOriginal.height, algorithm, numColors);
                    break;
                case 'noise':
                    applyNoiseDither(ditheredGrayscale, numColors);
                    break;
                case 'threshold':
                    applyThreshold(ditheredGrayscale, numColors);
                    break;
            }

            // 5. Apply custom colors
            const finalImageData = ctxDithered.createImageData(canvasOriginal.width, canvasOriginal.height);
            applyTonalColors(finalImageData.data, ditheredGrayscale, numColors);
            
            canvasDithered.width = finalImageData.width;
            canvasDithered.height = finalImageData.height;
            ctxDithered.putImageData(finalImageData, 0, 0);
        }
        
        // --- Image Processing Pipeline ---

        function applySharpen(data, width, height, amount) {
            const kernel = [
                [0, -amount, 0],
                [-amount, 1 + 4 * amount, -amount],
                [0, -amount, 0]
            ];
            const side = Math.floor(kernel.length / 2);
            const dataCopy = new Uint8ClampedArray(data);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    for (let c = 0; c < 3; c++) { // R, G, B
                        let sum = 0;
                        for (let ky = 0; ky < kernel.length; ky++) {
                            for (let kx = 0; kx < kernel.length; kx++) {
                                const nx = x + kx - side;
                                const ny = y + ky - side;
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    sum += dataCopy[(ny * width + nx) * 4 + c] * kernel[ky][kx];
                                }
                            }
                        }
                        data[i + c] = Math.max(0, Math.min(255, sum));
                    }
                }
            }
        }

        function toGrayscale(data) {
            const grayscale = new Uint8ClampedArray(data.length / 4);
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                // Using luminosity method for grayscale conversion
                const gray = 0.21 * r + 0.72 * g + 0.07 * b;
                grayscale[i / 4] = gray;
            }
            return grayscale;
        }
        
        // --- Tonal Mapping ---
        
        function getTonalThresholds(numColors) {
            const thresholds = [];
            for (let i = 1; i < numColors; i++) {
                thresholds.push(i * (255 / numColors));
            }
            return thresholds;
        }

        function quantize(pixel, numColors) {
            const step = 255 / (numColors - 1);
            return Math.round(Math.round(pixel / step) * step);
        }

        // --- Dithering Algorithms ---

        function applyThreshold(grayData, numColors) {
             for (let i = 0; i < grayData.length; i++) {
                grayData[i] = quantize(grayData[i], numColors);
            }
        }

        function applyErrorDiffusion(grayData, width, type, numColors) {
            const kernels = {
                'floyd-steinberg': { divisor: 16, points: [ { dx: 1, dy: 0, w: 7 }, { dx: -1, dy: 1, w: 3 }, { dx: 0, dy: 1, w: 5 }, { dx: 1, dy: 1, w: 1 } ] },
                'atkinson': { divisor: 8, points: [ { dx: 1, dy: 0, w: 1 }, { dx: 2, dy: 0, w: 1 }, { dx: -1, dy: 1, w: 1 }, { dx: 0, dy: 1, w: 1 }, { dx: 1, dy: 1, w: 1 }, { dx: 0, dy: 2, w: 1 } ] },
                'sierra-lite': { divisor: 4, points: [ { dx: 1, dy: 0, w: 2 }, { dx: -1, dy: 1, w: 1 }, { dx: 0, dy: 1, w: 1 } ] }
            };
            const kernel = kernels[type];
            const height = grayData.length / width;

            for (let i = 0; i < grayData.length; i++) {
                const y = Math.floor(i / width);
                const x = i % width;
                
                const oldPixel = grayData[i];
                const newPixel = quantize(oldPixel, numColors);
                const error = oldPixel - newPixel;

                grayData[i] = newPixel; // Set the quantized value

                for (const point of kernel.points) {
                    const nx = x + point.dx;
                    const ny = y + point.dy;
                    if (nx >= 0 && nx < width && ny < height) {
                        const index = ny * width + nx;
                        grayData[index] += error * point.w / kernel.divisor;
                    }
                }
            }
        }
        
        function applyOrderedDither(grayData, width, height, type, numColors) {
            let matrix, matrixSize, matrixDivisor;
            if (type === 'bayer4x4') {
                matrix = bayer4x4; matrixSize = 4; matrixDivisor = 16;
            } else if (type === 'bayer8x8') {
                matrix = bayer8x8; matrixSize = 8; matrixDivisor = 64;
            } else if (type === 'halftone4x4') {
                matrix = halftone4x4; matrixSize = 4; matrixDivisor = 16;
            }
            
            const ratio = (255 / matrixDivisor) / numColors;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = y * width + x;
                    const gray = grayData[i];
                    const matrixVal = matrix[y % matrixSize][x % matrixSize];
                    
                    const adjustedPixel = gray + (matrixVal - matrixDivisor / 2) * ratio;
                    grayData[i] = quantize(adjustedPixel, numColors);
                }
            }
        }
        
        function applyNoiseDither(grayData, numColors) {
            const ratio = 255 / numColors;
            for (let i = 0; i < grayData.length; i++) {
                const noise = (Math.random() - 0.5) * ratio;
                grayData[i] = quantize(grayData[i] + noise, numColors);
            }
        }
        
        function applyTonalColors(data, ditheredGrayscale, numColors) {
            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return [r, g, b];
            }

            const cShadows = hexToRgb(colorInputs.shadows.value);
            const cHighlights = hexToRgb(colorInputs.highlights.value);
            
            let colorMap;

            if (numColors === 2) {
                const t1 = 128;
                colorMap = (gray) => gray < t1 ? cShadows : cHighlights;
            } else if (numColors === 3) {
                const cMidDark = hexToRgb(colorInputs.midDark.value);
                const t1 = 85; const t2 = 170;
                colorMap = (gray) => gray < t1 ? cShadows : (gray < t2 ? cMidDark : cHighlights);
            } else { // numColors === 4
                const cMidDark = hexToRgb(colorInputs.midDark.value);
                const cMidLight = hexToRgb(colorInputs.midLight.value);
                const t1 = 64; const t2 = 128; const t3 = 192;
                colorMap = (gray) => gray < t1 ? cShadows : (gray < t2 ? cMidDark : (gray < t3 ? cMidLight : cHighlights));
            }

            for (let i = 0; i < ditheredGrayscale.length; i++) {
                const color = colorMap(ditheredGrayscale[i]);
                data[i * 4] = color[0];
                data[i * 4 + 1] = color[1];
                data[i * 4 + 2] = color[2];
                data[i * 4 + 3] = 255; // Alpha
            }
        }

        // --- Utility & Batch Functions ---
        function downloadImage() {
            const link = document.createElement('a');
            const ditherType = ditherSelect.value;
            link.download = `dithered-${ditherType}-${tonalMapSelect.value}color.png`;
            link.href = canvasDithered.toDataURL('image/png');
            link.click();
        }

        function handleBatchSelect(e) {
            const files = e.target.files;
            if (files.length === 0) {
                batchInfo.textContent = '';
                batchBtn.classList.add('hidden');
                return;
            };
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            batchInfo.textContent = `${imageFiles.length} image(s) selected.`;
            batchBtn.classList.remove('hidden');
            if (imageFiles.length === 0) {
                batchBtn.disabled = true;
                batchInfo.textContent = 'No valid image files found.';
            } else {
                batchBtn.disabled = false;
            }
        }

        async function handleBatchProcess() {
            const files = Array.from(batchLoader.files).filter(file => file.type.startsWith('image/'));
            if (files.length === 0) return;

            batchBtn.disabled = true;
            batchTrigger.disabled = true;
            batchLoaderSpinner.classList.remove('hidden');
            batchBtnText.textContent = 'Processing...';

            const zip = new JSZip();
            const offscreenCanvas = document.createElement('canvas');
            const offscreenCtx = offscreenCanvas.getContext('2d');
            const tempCanvas = document.createElement('canvas'); // For high-quality scaling
            const tempCtx = tempCanvas.getContext('2d');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                batchInfo.textContent = `Processing ${i + 1} of ${files.length}: ${file.name}`;
                try {
                    const img = await loadImageFromFile(file);
                    
                    // --- 1. Scaling ---
                    const scale = parseInt(scaleSlider.value) / 100;
                    const targetWidth = Math.round(img.width * scale);
                    const targetHeight = Math.round(img.height * scale);
                    const resampling = resamplingSelect.value;
                    
                    offscreenCanvas.width = targetWidth;
                    offscreenCanvas.height = targetHeight;

                    if (resampling === 'smooth' && scale < 1) {
                        tempCanvas.width = img.width;
                        tempCanvas.height = img.height;
                        tempCtx.drawImage(img, 0, 0);
                        let cw = img.width, ch = img.height;
                        while (cw * 0.5 > targetWidth) {
                            cw *= 0.5; ch *= 0.5;
                            tempCtx.drawImage(tempCanvas, 0, 0, cw * 2, ch * 2, 0, 0, cw, ch);
                        }
                        offscreenCtx.imageSmoothingEnabled = true;
                        offscreenCtx.imageSmoothingQuality = 'high';
                        offscreenCtx.drawImage(tempCanvas, 0, 0, cw, ch, 0, 0, targetWidth, targetHeight);
                    } else {
                        offscreenCtx.imageSmoothingEnabled = false;
                        offscreenCtx.drawImage(img, 0, 0, targetWidth, targetHeight);
                    }

                    // --- 2. Filters ---
                    const blur = parseInt(blurSlider.value);
                    const sharpen = parseInt(sharpenSlider.value) / 100;
                    const brightness = parseInt(brightnessSlider.value);
                    const contrast = parseInt(contrastSlider.value);
                    let filterString = '';
                    if (blur > 0) filterString += `blur(${blur}px) `;
                    if (brightness !== 0) filterString += `brightness(${100 + brightness}%) `;
                    if (contrast !== 0) filterString += `contrast(${100 + contrast}%) `;
                    offscreenCtx.filter = filterString;
                    offscreenCtx.drawImage(offscreenCanvas, 0, 0);
                    offscreenCtx.filter = 'none';

                    let imageData = offscreenCtx.getImageData(0, 0, targetWidth, targetHeight);
                    if (sharpen > 0) {
                        applySharpen(imageData.data, targetWidth, targetHeight, sharpen);
                    }

                    // --- 3. Dithering ---
                    const grayscaleData = toGrayscale(imageData.data);
                    const algorithm = ditherSelect.value;
                    const numColors = parseInt(tonalMapSelect.value);
                    let ditheredGrayscale = new Float32Array(grayscaleData);

                    switch(algorithm) {
                        case 'floyd-steinberg': case 'atkinson': case 'sierra-lite':
                            applyErrorDiffusion(ditheredGrayscale, targetWidth, algorithm, numColors);
                            break;
                        case 'bayer4x4': case 'bayer8x8': case 'halftone4x4':
                            applyOrderedDither(ditheredGrayscale, targetWidth, targetHeight, algorithm, numColors);
                            break;
                        case 'noise':
                            applyNoiseDither(ditheredGrayscale, numColors);
                            break;
                        case 'threshold':
                            applyThreshold(ditheredGrayscale, numColors);
                            break;
                    }
                    
                    // --- 4. Coloring ---
                    applyTonalColors(imageData.data, ditheredGrayscale, numColors);
                    offscreenCtx.putImageData(imageData, 0, 0);

                    // --- 5. Zip ---
                    const blob = await new Promise(resolve => offscreenCanvas.toBlob(resolve, 'image/png'));
                    zip.file(file.name.replace(/\.[^/.]+$/, "") + '-dithered.png', blob);

                } catch (error) {
                    console.error(`Could not process file ${file.name}:`, error);
                }
            }

            batchInfo.textContent = 'Zipping files...';
            const zipBlob = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(zipblob);
            link.download = 'dithered-images.zip';
            link.click();
            URL.revokeObjectURL(link.href);

            batchBtn.disabled = false;
            batchTrigger.disabled = false;
            batchLoaderSpinner.classList.add('hidden');
            batchBtnText.textContent = 'Process Files';
            batchInfo.textContent = `${files.length} images processed.`;
        }

        function loadImageFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = (err) => reject(err);
                    img.src = event.target.result;
                };
                reader.onerror = (err) => reject(err);
                reader.readAsDataURL(file);
            });
        }
    </script>
