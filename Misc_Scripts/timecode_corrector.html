<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timecode Corrector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for better input appearance */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .timecode-input {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto max-w-4xl p-4 sm:p-6 md:p-8">
        
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">Timecode Corrector</h1>
            <p class="text-gray-600 mt-2">Automatically adjust timecodes after adding or removing footage.</p>
        </header>

        <!-- Controls -->
        <div class="bg-white p-4 rounded-xl shadow-md mb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <label for="frameRate" class="font-medium text-gray-700">Frame Rate (FPS):</label>
                <input type="number" id="frameRate" value="30" class="w-20 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
            </div>
            <button id="add-row-btn" class="w-full sm:w-auto bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w2.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Add Timecode
            </button>
        </div>

        <!-- Timecode List Header -->
        <div class="hidden md:grid grid-cols-12 gap-4 mb-2 px-4 font-bold text-sm text-gray-500">
            <div class="col-span-1">#</div>
            <div class="col-span-4">Original Timecode</div>
            <div class="col-span-3">Edit (+/- in seconds)</div>
            <div class="col-span-4">Corrected Timecode</div>
        </div>

        <!-- Timecode List Container -->
        <div id="timecode-list" class="space-y-3">
            <!-- Timecode rows will be injected here by JavaScript -->
        </div>

    </div>

    <script>
        // State management
        let timecodeEntries = [];
        let nextId = 0;
        
        // DOM Elements
        const listContainer = document.getElementById('timecode-list');
        const addRowBtn = document.getElementById('add-row-btn');
        const frameRateInput = document.getElementById('frameRate');

        // --- Core Logic ---

        const timecodeToSeconds = (tc, fr) => {
            const parts = tc.split(':').map(part => parseInt(part, 10));
            if (parts.length !== 4 || parts.some(isNaN)) return NaN;
            const [hours, minutes, seconds, frames] = parts;
            return (hours * 3600) + (minutes * 60) + seconds + (frames / fr);
        };

        const secondsToTimecode = (totalSeconds, fr) => {
            if (isNaN(totalSeconds) || totalSeconds < 0) return '00:00:00:00';
            const totalFrames = Math.round(totalSeconds * fr);
            const frames = totalFrames % fr;
            const remainingSeconds = Math.floor(totalFrames / fr);
            const seconds = remainingSeconds % 60;
            const totalMinutes = Math.floor(remainingSeconds / 60);
            const minutes = totalMinutes % 60;
            const hours = Math.floor(totalMinutes / 60);
            const pad = (num) => num.toString().padStart(2, '0');
            return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}:${pad(frames)}`;
        };

        /**
         * Recalculates all corrected timecodes in the state array, but does NOT touch the DOM.
         */
        const recalculateTimecodes = () => {
            let cumulativeOffset = 0;
            const frameRate = parseInt(frameRateInput.value, 10) || 30;

            timecodeEntries.forEach(entry => {
                const originalInSeconds = timecodeToSeconds(entry.originalTimecode, frameRate);
                
                if (isNaN(originalInSeconds)) {
                    entry.correctedTimecode = 'Invalid Input';
                } else {
                    const correctedInSeconds = originalInSeconds + cumulativeOffset;
                    entry.correctedTimecode = secondsToTimecode(correctedInSeconds, frameRate);
                }
                
                cumulativeOffset += entry.editInSeconds;
            });
        };
        
        /**
         * Updates only the display divs for corrected timecodes.
         * This avoids re-rendering the inputs and stealing focus.
         */
        const updateCorrectedTimecodeDisplays = () => {
             timecodeEntries.forEach(entry => {
                const row = listContainer.querySelector(`[data-id='${entry.id}']`);
                if (row) {
                    const correctedTimecodeDiv = row.querySelector('.corrected-timecode-output');
                    if (correctedTimecodeDiv) {
                        correctedTimecodeDiv.textContent = entry.correctedTimecode;
                    }
                }
            });
        };

        /**
         * Renders the entire list from scratch. Used for adding/deleting rows.
         */
        const render = () => {
            listContainer.innerHTML = '';
            if (timecodeEntries.length === 0) {
                 listContainer.innerHTML = `
                    <div class="text-center py-10 px-4 bg-white rounded-xl shadow-md">
                        <h3 class="text-lg font-medium text-gray-900">No timecodes yet!</h3>
                        <p class="text-gray-500 mt-1">Click "Add Timecode" to get started.</p>
                    </div>
                `;
                return;
            }
            timecodeEntries.forEach((entry, index) => {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-x-4 gap-y-2 items-center bg-white p-4 rounded-xl shadow-md';
                row.dataset.id = entry.id;

                row.innerHTML = `
                    <!-- Row Index -->
                    <div class="col-span-1 font-bold text-indigo-600 text-center">${index + 1}</div>
                    
                    <!-- Original Timecode -->
                    <div class="col-span-11 md:col-span-4">
                        <label class="text-sm font-medium text-gray-500 md:hidden">Original Timecode</label>
                        <input type="text" value="${entry.originalTimecode}" data-field="originalTimecode" placeholder="HH:MM:SS:FF" class="timecode-input mt-1 w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    </div>

                    <!-- Edit Amount -->
                    <div class="col-span-12 sm:col-span-6 md:col-span-3 md:col-start-6">
                        <label class="text-sm font-medium text-gray-500 md:hidden">Edit (+/- seconds)</label>
                        <input type="number" step="0.01" value="${entry.editInSeconds}" data-field="editInSeconds" placeholder="+/- seconds" class="mt-1 w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    </div>
                    
                    <!-- Corrected Timecode -->
                    <div class="col-span-12 sm:col-span-6 md:col-span-3">
                         <label class="text-sm font-medium text-gray-500 md:hidden">Corrected Timecode</label>
                        <div class="corrected-timecode-output mt-1 p-2 h-10 flex items-center bg-gray-100 rounded-md border border-gray-200 text-gray-700 font-semibold timecode-input">${entry.correctedTimecode}</div>
                    </div>

                    <!-- Delete Button -->
                    <div class="col-span-12 md:col-span-1 flex justify-end">
                        <button data-action="delete" class="text-gray-400 hover:text-red-600 transition-colors p-2 rounded-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        };

        // --- Event Handlers ---

        const handleAddRow = () => {
            timecodeEntries.push({
                id: nextId++,
                originalTimecode: '00:00:00:00',
                editInSeconds: 0,
                correctedTimecode: '00:00:00:00'
            });
            recalculateTimecodes();
            render();
        };
        
        const handleFrameRateChange = () => {
            recalculateTimecodes();
            render();
        };

        const handleListInteraction = (e) => {
            const row = e.target.closest('[data-id]');
            if (!row) return;

            const id = parseInt(row.dataset.id, 10);
            const entry = timecodeEntries.find(item => item.id === id);
            if (!entry) return;

            // Handle delete button
            if (e.target.closest('[data-action="delete"]')) {
                timecodeEntries = timecodeEntries.filter(item => item.id !== id);
                recalculateTimecodes();
                render(); // Full re-render needed after deletion
                return;
            }

            // Handle input changes
            const inputField = e.target.dataset.field;
            if (inputField) {
                if (inputField === 'editInSeconds') {
                    entry.editInSeconds = parseFloat(e.target.value) || 0;
                } else {
                    entry[inputField] = e.target.value;
                }
                recalculateTimecodes(); // Update the data model
                updateCorrectedTimecodeDisplays(); // Only update the output text
            }
        };

        // --- Initial Setup ---

        addRowBtn.addEventListener('click', handleAddRow);
        frameRateInput.addEventListener('change', handleFrameRateChange);
        listContainer.addEventListener('input', handleListInteraction);
        listContainer.addEventListener('click', handleListInteraction);

        // Add a few initial rows to demonstrate usage
        handleAddRow();
        handleAddRow();
        handleAddRow();

    </script>
</body>
</html>
